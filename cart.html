<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlowSkin - Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: #fffaf5;
      padding: 40px;
      color: #2b2b2b;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .cart-container {
      max-width: 900px;
      margin: auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #e5d4c1;
    }

    .cart-item img {
      width: 80px;
      border-radius: 10px;
      margin-right: 20px;
    }

    .item-info {
      display: flex;
      align-items: center;
    }

    .item-details h4 {
      margin-bottom: 5px;
    }

    .total {
      text-align: right;
      font-size: 1.2rem;
      margin-top: 30px;
    }

    .confirm-btn {
      display: block;
      margin: 30px auto 0;
      background-color: #3c2f2f;
      color: #fff;
      padding: 12px 30px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }

    .confirm-btn:hover {
      background-color: #000;
    }
  </style>
</head>
<body>
  <h1>Your Cart</h1>
  <div class="cart-container" id="cart"></div>
  <div class="total" id="total"></div>
  <button class="confirm-btn" onclick="confirmOrder()">Confirm Order</button>

  <script>
    const cartContainer = document.getElementById("cart");
    const totalElement = document.getElementById("total");
    let cart = JSON.parse(localStorage.getItem("cartItems")) || [];

    let productImages = {
      "Cetaphil Cleanser": "cetaphilcleanser.jpg",
      "CeraVe Cleanser": "https://i.ibb.co/dBfhw4F/cerave.jpg",
      "Simple Face Wash": "https://i.ibb.co/QdS0xRn/simple.jpg",
      "Ordinary Cleanser": "https://i.ibb.co/6rJrwFL/ordinary.jpg",
      "Plum Rice Toner": "https://i.ibb.co/QfrvLXt/plum.jpg",
      "Centella Toner": "https://i.ibb.co/WDY44Wn/centella.jpg",
      "Dot and Key Toner": "https://i.ibb.co/LJYrpBP/dotkey.jpg",
      "Beauty of Joseon Toner": "https://i.ibb.co/GpFJ6MB/boj-toner.jpg",
      "Minimalist Serum": "https://i.ibb.co/Yb2t1qh/minimalist.jpg",
      "Ordinary Serum": "https://i.ibb.co/pJTbLkR/ordinary-serum.jpg",
      "Centella Serum": "https://i.ibb.co/MgQZGkL/centella-serum.jpg",
      "Beauty of Joseon Serum": "https://i.ibb.co/Sc7wWW7/boj-serum.jpg",
      "Neutrogena Hydro Boost": "https://i.ibb.co/9hVZrFr/neutrogena.jpg",
      "Cetaphil Moisturizer": "https://i.ibb.co/fHrWZJG/cetaphil.jpg",
      "Plum Rice Moisturizer": "https://i.ibb.co/QfrvLXt/plum.jpg",
      "CeraVe Moisturizer": "https://i.ibb.co/dBfhw4F/cerave.jpg",
      "Vaseline Lip Therapy": "https://i.ibb.co/G3X4gVk/vaseline.jpg",
      "Laneige Lip Mask": "https://i.ibb.co/Nj6mdS6/laneige.jpg",
      "Butter Elixir": "https://i.ibb.co/WvGBVjb/butter.jpg",
      "Aquaphor": "https://i.ibb.co/vh2Xyxn/aquaphor.jpg",
      "La Shield Sunscreen": "https://i.ibb.co/0F3QXw9/lasheild.jpg",
      "Minimalist Sunscreen": "https://i.ibb.co/ZLMBmZr/min-sunscreen.jpg",
      "Aqualogica Sunscreen": "https://i.ibb.co/XYcKJz3/aqualogica.jpg"
    };

    let total = 0;
    cart.forEach(item => {
      let div = document.createElement("div");
      div.classList.add("cart-item");
      div.innerHTML = `
        <div class="item-info">
          <img src="${productImages[item.name] || 'https://via.placeholder.com/80'}" alt="${item.name}" />
          <div class="item-details">
            <h4>${item.name}</h4>
            <p>₹${item.price}</p>
          </div>
        </div>
        <div>Qty: 1</div>
      `;
      cartContainer.appendChild(div);
      total += item.price;
    });

    total += 49; // shipping charge
    totalElement.innerText = `Shipping: ₹49\nTotal: ₹${total}`;

    function confirmOrder() {
      alert("Your order has been confirmed! Thank you for shopping with GlowSkin.");
      localStorage.removeItem("cartItems");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
